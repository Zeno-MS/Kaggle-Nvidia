# Nemotron Challenge — Default Configuration
#
# Updated 2026-03-26 from metric source code analysis.
# Values marked [VERIFIED] are confirmed from metric/demo notebooks.
# Values marked [TBD] still need benchmark data to determine.
#
# Usage: Config().load_yaml("configs/default.yaml")

# --- Competition-fixed parameters (from metric source code) ---

evaluation:                                # [VERIFIED] from metric score() function
  model_id: "nemotron-3-nano-30b-a3b-bf16"
  temperature: 1.0
  top_p: 1.0
  max_tokens: 3584
  max_model_len: 4096
  max_num_seqs: 128
  gpu_memory_utilization: 0.85
  tensor_parallel_size: 1
  answer_format: "\\boxed{}"              # Metric appends boxed instruction to every prompt
  answer_extraction: "last_boxed"         # extract_final_answer() takes last \boxed{} match
  numeric_tolerance: 0.01                 # rel_tol=1e-2, abs_tol=1e-5
  string_comparison: "case_insensitive"
  enable_thinking: true                   # Chat template uses enable_thinking=True
  enable_prefix_caching: true
  enable_chunked_prefill: true

# --- LoRA adapter constraints (from demo notebook) ---

lora:                                      # [VERIFIED] from submission demo
  rank: 32                                 # Maximum allowed
  alpha: 16
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj)$"
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Benchmark (needs data download to confirm) ---

benchmark:
  format: "csv"                            # [VERIFIED] train.csv + test.csv
  prompt_column: "prompt"                  # [VERIFIED] from metric code: item.prompt
  answer_column: "answer"                  # [VERIFIED] from metric code: item.answer
  train_size: "unknown"                    # [TBD] ~3MB CSV
  test_size: "unknown"                     # [TBD] ~1.4KB CSV (small)
  problem_types: "mixed_reasoning"         # [TBD] expected: math, logic, games, etc.
  answer_types: "numeric_and_string"       # [VERIFIED] verify() handles both

# --- Training configuration ---

training:
  learning_rate: 2e-4                      # [TBD] starting point, needs sweep
  num_epochs: 3                            # [TBD] start conservative, watch for overfit
  batch_size: 4                            # [TBD] depends on GPU memory
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 4096                     # Match eval max_model_len
  fp16: false
  bf16: true                               # Match model dtype
  include_reasoning_in_target: true        # Train on full CoT + answer
  answer_format_in_training: "\\boxed{}"   # Ensure model learns to produce boxed answers

# --- Synthetic data generation ---

synthetic:
  teacher_models:
    - "nemotron-3-super-120b-a12b"         # Best open NVIDIA teacher
    - "deepseek-r1"                        # Strong reasoning
    - "qwen-2.5-72b"                       # Diverse generation
  verification_enabled: true               # Verify answers programmatically
  target_multiplier: 10                    # [TBD] aim for 10x train set
  categories_to_oversample: []             # [TBD] fill after baseline profiling

# --- External datasets ---

external_data:
  - name: "Nemotron-RL-ReasoningGym-v1"
    source: "huggingface"
    samples: 15000
    relevance: "high"                      # 104 reasoning environments, matches expected benchmark
  - name: "Puzzle-KD-Nemotron-Post-Training-Dataset-v2"
    source: "huggingface"
    samples: 851343
    relevance: "medium"                    # Math/code/STEM, may overlap with benchmark
  - name: "MATH"
    source: "huggingface"
    relevance: "conditional"               # Only if benchmark is math-heavy
  - name: "GSM8K"
    source: "huggingface"
    relevance: "conditional"

# --- Local evaluation harness ---

local_eval:
  enabled: true
  validation_split: 0.15                   # Hold out 15% of train for validation
  num_eval_seeds: 3                        # Run eval 3x at temp=1.0, average
  replicate_metric: true                   # Use exact same verify() + extract_final_answer()
  track_per_category: true                 # [TBD] requires category labels
